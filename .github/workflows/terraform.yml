name: terraform

on:
  pull_request:
    paths:
      - "bootstrap/**"
      - "envs/**"
      - "modules/**"
      - ".github/workflows/terraform.yml"
  push:
    branches:
      - main
    paths:
      - "bootstrap/**"
      - "envs/**"
      - "modules/**"
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to apply"
        type: choice
        required: true
        options:
          - dev
          - stage
          - prod
      action:
        description: "Plan or apply"
        type: choice
        required: true
        options:
          - plan
          - apply

permissions:
  contents: read
  id-token: write
  pull-requests: write

env:
  TF_VERSION: "1.9.5"

jobs:
  bootstrap:
    if: github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && inputs.action == 'plan')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bootstrap
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform format
        working-directory: .
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate

  plan:
    if: github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && inputs.action == 'plan')
    strategy:
      matrix:
        environment: [dev, stage, prod]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: envs/${{ matrix.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_TF_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Terraform fmt
        working-directory: .
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: terraform init -backend-config=backend.hcl

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: terraform plan -no-color -out=tfplan

  apply:
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.action == 'apply')
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'push' && 'dev' || inputs.environment }}
    concurrency:
      group: terraform-${{ github.event_name == 'push' && 'dev' || inputs.environment }}
      cancel-in-progress: false
    defaults:
      run:
        working-directory: envs/${{ github.event_name == 'push' && 'dev' || inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_TF_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Terraform init
        run: terraform init -backend-config=backend.hcl

      - name: Terraform plan
        run: terraform plan -no-color -out=tfplan

      - name: Terraform apply
        run: terraform apply -auto-approve tfplan
